services:

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - ENABLE_SCHEDULER=true        # runs the pipeline daily at 03:00 UTC
      - API_RELOAD_URL=http://localhost:8000/api/reload
    volumes:
      - ./data:/app/data             # persist PDFs and processed JSON
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Next.js dashboard ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api   # override for production
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
